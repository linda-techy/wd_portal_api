# ╔══════════════════════════════════════════════════════════════╗
# ║  WD Portal API — Base Configuration (all profiles)          ║
# ║  No secrets here — per-environment values in profile YAMLs  ║
# ╚══════════════════════════════════════════════════════════════╝

spring:
  application:
    name: wd-portal-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  main:
    banner-mode: off

  # ── Jackson (global serialization) ─────────────────────────────
  jackson:
    serialization:
      write-dates-as-timestamps: false

  # ── Database (connection details in profile YAMLs) ──────────────
  datasource:
    driver-class-name: org.postgresql.Driver
    hikari:
      connectionTimeout: 60000
      validationTimeout: 20000
      initializationFailTimeout: 60000
      idleTimeout: 300000
      maxLifetime: 1200000

  # ── JPA base ────────────────────────────────────────────────────
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        temp:
          use_jdbc_metadata_defaults: false

  # ── Flyway ──────────────────────────────────────────────────────
  flyway:
    baseline-on-migrate: true
    out-of-order: true
    baseline-version: 1
    validate-on-migrate: true
    table: portal_flyway_schema_history   # Prevents collision with Customer API's Flyway history on shared DB

  # ── File upload limits ──────────────────────────────────────────
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 20MB

  # ── Mail (full config here — identical across all environments)
  # Host: smtp.hostinger.com:465 uses IMPLICIT SSL (not STARTTLS).
  # starttls.enable MUST be false on port 465 — STARTTLS is for port 587 only.
  # ssl.trust prevents certificate errors on VPS JVMs that lack the Hostinger CA.
  mail:
    host: smtp.hostinger.com
    port: 465
    username: ${MAIL_USERNAME:info@walldotbuilders.com}
    # password: override per profile — never hardcoded here
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
            trust: smtp.hostinger.com
          starttls:
            enable: false
            required: false
          connectiontimeout: 10000
          timeout: 10000
          writetimeout: 10000

# ── JWT base (expiry times — secret in profile YAMLs) ───────────
jwt:
  access-token-expiration: 3600000       # 1 hour
  refresh-token-expiration: 604800000    # 7 days
  aud:
    value: "portal-api"
    enforce: false

# ── Task Alerts ─────────────────────────────────────────────────
task:
  alerts:
    enabled: true
    cron: "0 0 9 * * *"
    timezone: Asia/Kolkata

# ── App feature flags ────────────────────────────────────────────
app:
  email:
    enabled: true
  # Portal app base URL — portal password reset links point here.
  portal-app-base-url: "https://portal.walldotbuilders.com"
  # Customer app base URL — reset links in password-reset emails point here.
  customer-app-base-url: "https://app.walldotbuilders.com"
  # Website base URL — partner password reset emails point here.
  website-base-url: "https://walldotbuilders.com"

# ── OpenAPI / Swagger UI ─────────────────────────────────────────
# Override per profile: swagger-ui.enabled: true in local/staging, false in production
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui
    enabled: ${SWAGGER_ENABLED:false}
  show-actuator: false

# ── Company Info (static — not sensitive) ────────────────────────
company:
  name: Walldot Builders LLP
  address: Kerala, India
  phone: "+91 9876543210"
  email: info@walldotbuilders.com
  website: www.walldotbuilders.com
  gst: ""
  pan: ""

# ── Customer API webhook integration ─────────────────────────────
# Portal notifies Customer API on key events (site reports, invoices, payments, etc.)
customer-api:
  webhook-url: ${CUSTOMER_API_WEBHOOK_URL:http://localhost:8081/internal/portal-events}
  webhook-secret: ${PORTAL_WEBHOOK_SECRET:}
