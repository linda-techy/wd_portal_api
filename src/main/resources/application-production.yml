# ╔══════════════════════════════════════════════════════════════════╗
# ║  Portal API — PRODUCTION Profile                                 ║
# ║  🔑 SHARED STORAGE: same path as customer API for cross-app files║
# ╚══════════════════════════════════════════════════════════════════╝

server:
  port: 8082
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/plain
    min-response-size: 1024
  error:
    include-message: never
    include-stacktrace: never

spring:
  datasource:
    url: jdbc:postgresql://46.202.164.251:5432/wdTestDB
    username: postgres
    password: Staygether@2025
    hikari:
      maximum-pool-size: 50             # Tuned for 100k users — max = 80% of DB max_connections
      minimum-idle: 10
      connection-timeout: 30000         # 30s — fail fast rather than back-pressure
      idle-timeout: 600000              # 10 min
      max-lifetime: 1800000             # 30 min
      leak-detection-threshold: 60000   # Log connections open > 60s

  # ── Async thread pool (prevents unbounded thread creation by @Async) ──
  task:
    execution:
      pool:
        core-size: 20
        max-size: 100
        queue-capacity: 1000
        keep-alive: 60s
      thread-name-prefix: async-prod-
    scheduling:
      pool:
        size: 5
      thread-name-prefix: sched-prod-
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true

  mail:
    host: smtp.hostinger.com
    port: 465
    username: info@walldotbuilders.com
    password: Staygether@2025

jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970

# ── Shared storage (SAME path as customer-api production) ───────────
# storageBasePath at root level — matches customer API exactly
file:
  upload-dir: /home/ftpuser/var/www/app/walldotbuilders/storage
storageBasePath: /home/ftpuser/var/www/app/walldotbuilders/storage

app:
  cors:
    allowed-origins: https://portal.walldotbuilders.com,https://walldotbuilders.com,https://www.walldotbuilders.com
  admin:
    email: info@walldotbuilders.com

logging:
  level:
    root: WARN
    com.wd.api: INFO
    org.springframework: WARN
    org.hibernate: WARN
