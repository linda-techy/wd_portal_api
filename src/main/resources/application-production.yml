# ╔══════════════════════════════════════════════════════════════════╗
# ║  Portal API — PRODUCTION Profile                                 ║
# ║  🔑 SHARED STORAGE: same path as customer API for cross-app files║
# ╚══════════════════════════════════════════════════════════════════╝

server:
  port: 8080
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/plain
    min-response-size: 1024
  error:
    include-message: never
    include-stacktrace: never

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20             # Lower startup pressure on remote DB
      minimum-idle: 5
      connection-timeout: 30000         # 30s — fail fast rather than back-pressure
      idle-timeout: 240000              # 4 min (must stay below max-lifetime)
      max-lifetime: 300000              # 5 min, rotate connections before infra closes them
      keepalive-time: 120000            # 2 min heartbeat to avoid stale idle sockets
      leak-detection-threshold: 60000   # Log connections open > 60s
      validation-timeout: 10000
      data-source-properties:
        tcpKeepAlive: true
        connectTimeout: 10
        socketTimeout: 30
        keepalives: 1
        keepalives_idle: 30
        keepalives_interval: 10
        keepalives_count: 5

  # ── Async thread pool (prevents unbounded thread creation by @Async) ──
  task:
    execution:
      pool:
        core-size: 20
        max-size: 100
        queue-capacity: 1000
        keep-alive: 60s
      thread-name-prefix: async-prod-
    scheduling:
      pool:
        size: 5
      thread-name-prefix: sched-prod-
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true
    validate-migration-naming: true

  mail:
    # SSL host/port/properties are in application.yml (base).
    # MAIL_PASSWORD must be set as an environment variable on the VPS.
    password: ${MAIL_PASSWORD}

jwt:
  secret: ${JWT_SECRET}

# ── Shared storage (SAME path as customer-api production) ───────────
# storageBasePath at root level — matches customer API exactly
file:
  upload-dir: /home/ftpuser/var/www/app/walldotbuilders/storage
storageBasePath: /home/ftpuser/var/www/app/walldotbuilders/storage

app:
  cors:
    allowed-origins: https://portal.walldotbuilders.com,https://walldotbuilders.com,https://www.walldotbuilders.com
  admin:
    email: info@walldotbuilders.com
    # Seed credentials for DataInitializer — only used on first boot if no admin user exists.
    # Override via environment variables ADMIN_SEED_EMAIL / ADMIN_SEED_PASSWORD for production.
    seed-email: ${ADMIN_SEED_EMAIL:admin@walldotbuilders.com}
    seed-password: ${ADMIN_SEED_PASSWORD:Admin@2025}
  # Portal API's own public base URL (e.g. https://api.walldotbuilders.com)
  base-url: ""

logging:
  level:
    root: WARN
    com.wd.api: INFO
    org.springframework: WARN
    org.hibernate: WARN
