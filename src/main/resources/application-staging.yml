server:
  port: 8080
  error:
    include-message: never
    include-stacktrace: never

spring:
  datasource:
    url: jdbc:postgresql://46.202.164.251:5432/wdTestDB
    username: postgres
    password: Staygether@2025
    hikari:
      maximum-pool-size: 15
      minimum-idle: 3
      connection-timeout: 30000
      idle-timeout: 240000
      max-lifetime: 300000
      keepalive-time: 120000
      leak-detection-threshold: 60000
      validation-timeout: 10000
      data-source-properties:
        tcpKeepAlive: true
        connectTimeout: 10
        socketTimeout: 30
        keepalives: 1
        keepalives_idle: 30
        keepalives_interval: 10
