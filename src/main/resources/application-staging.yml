# ╔══════════════════════════════════════════════════════════════════╗
# ║  Portal API — STAGING Profile                                    ║
# ║  🔑 SHARED STORAGE: same path as customer API for cross-app files║
# ╚══════════════════════════════════════════════════════════════════╝

server:
  port: 8080
  error:
    include-message: never
    include-stacktrace: never

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://46.202.164.251:5432/wdTestDB}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 15
      minimum-idle: 3
      connection-timeout: 30000
      idle-timeout: 240000
      max-lifetime: 300000
      keepalive-time: 120000
      leak-detection-threshold: 60000
      validation-timeout: 10000
      data-source-properties:
        tcpKeepAlive: true
        connectTimeout: 10
        socketTimeout: 30
        keepalives: 1
        keepalives_idle: 30
        keepalives_interval: 10
        keepalives_count: 5

  task:
    execution:
      pool:
        core-size: 10
        max-size: 50
        queue-capacity: 500
      thread-name-prefix: async-staging-
    scheduling:
      pool:
        size: 3
      thread-name-prefix: sched-staging-
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true
    validate-migration-naming: true

  mail:
    # SSL host/port/properties are in application.yml (base).
    # MAIL_PASSWORD must be set as an environment variable on the staging server.
    password: ${MAIL_PASSWORD}

jwt:
  secret: ${JWT_SECRET}

# ── Shared storage (SAME path as customer-api staging) ──────────────
# storageBasePath at root level — matches customer API exactly
file:
  upload-dir: /home/ftpuser/var/www/app/walldotbuilders/storage
storageBasePath: /home/ftpuser/var/www/app/walldotbuilders/storage

app:
  cors:
    allowed-origins: https://portal.walldotbuilders.com,https://app.walldotbuilders.com
  admin:
    email: info@walldotbuilders.com
    seed-email: ${ADMIN_SEED_EMAIL:admin@walldotbuilders.com}
    seed-password: ${ADMIN_SEED_PASSWORD:Admin@2025}
  # Portal API's own public base URL for staging
  base-url: ""

logging:
  level:
    root: INFO
    com.wd.api: INFO
    org.springframework: WARN
    org.hibernate: WARN
