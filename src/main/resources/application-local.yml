# ╔══════════════════════════════════════════════════════════════════╗
# ║  Portal API — LOCAL Profile                                      ║
# ║  🔑 SHARED STORAGE: same path as customer API for cross-app files║
# ╚══════════════════════════════════════════════════════════════════╝

server:
  port: 8080
  error:
    include-message: always
    include-stacktrace: always

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://46.202.164.251:5432/wdTestDB}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximumPoolSize: 5
      minimumIdle: 2
      connection-timeout: 30000
      validation-timeout: 10000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  flyway:
    enabled: true

  mail:
    host: smtp.hostinger.com
    port: 465
    username: ${MAIL_USERNAME:info@walldotbuilders.com}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
          starttls:
            enable: true
            required: false
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

jwt:
  secret: ${JWT_SECRET:6c6f63616c2d6465762d6a77742d7365637265742d6b65792d6e6f742d666f72-production-000000000000}

# ── Shared storage (SAME path as customer-api local) ────────────────
# storageBasePath MUST be root-level (not under file:)
file:
  upload-dir: "N:\\Projects\\wd projects git\\storage"
storageBasePath: "N:\\Projects\\wd projects git\\storage"

app:
  cors:
    allowed-origins: http://localhost:3001,http://127.0.0.1:3001,http://localhost:3000
  admin:
    email: dev@walldotbuilders.com
  customer-app-base-url: "http://localhost:3000"
  website-base-url: "http://localhost:3000"

springdoc:
  swagger-ui:
    enabled: true

logging:
  level:
    root: INFO
    com.wd.api: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE
